<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approach B: Brilliant-Style Full Takeover</title>
<style>
  /* ── Reset ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Design Tokens ── */
  :root {
    --bg:          hsl(225, 8%, 7%);
    --surface:     hsl(225, 8%, 11%);
    --elevated:    hsl(225, 7%, 13%);
    --text:        hsl(220, 5%, 90%);
    --text-muted:  hsl(220, 5%, 55%);
    --primary:     hsl(258, 78%, 64%);
    --primary-dim: hsl(258, 60%, 48%);
    --primary-bg:  hsla(258, 78%, 64%, 0.10);
    --primary-bg2: hsla(258, 78%, 64%, 0.18);
    --border:      rgba(255,255,255,0.10);
    --border-light:rgba(255,255,255,0.06);
    --success:     hsl(152, 65%, 48%);
    --success-bg:  hsla(152, 65%, 48%, 0.12);
    --error:       hsl(0, 65%, 58%);
    --error-bg:    hsla(0, 65%, 58%, 0.12);
    --font:        system-ui, -apple-system, 'Segoe UI', sans-serif;
    --mono:        'SF Mono', ui-monospace, 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    --radius:      14px;
    --radius-sm:   10px;
    --radius-xs:   6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Page Header (demo label) ── */
  .demo-header {
    padding: 28px 40px 22px;
    text-align: center;
  }
  .demo-header h1 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 8px;
  }
  .demo-header p {
    font-size: 13px;
    color: var(--text-muted);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ── Lesson Viewport Container ── */
  .lesson-viewport {
    max-width: 1160px;
    margin: 0 auto 32px;
    padding: 0 24px;
  }

  /* ── Takeover Card ── */
  .takeover-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 8px 40px rgba(0,0,0,0.45),
      0 2px 12px rgba(0,0,0,0.3);
    position: relative;
  }

  /* ── Progress Bar ── */
  .progress-bar-track {
    height: 3px;
    background: rgba(255,255,255,0.04);
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    width: 33.3%;
    background: linear-gradient(90deg, var(--primary-dim), var(--primary));
    border-radius: 0 3px 3px 0;
    position: relative;
    transition: width 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .progress-bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: -1px;
    width: 24px; height: 5px;
    background: var(--primary);
    filter: blur(6px);
    border-radius: 50%;
  }

  /* ── Lesson Label ── */
  .lesson-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px 0;
  }
  .lesson-label-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .lesson-icon {
    width: 28px; height: 28px;
    background: var(--primary-bg);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lesson-icon svg { width: 14px; height: 14px; }
  .lesson-title-sm {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .lesson-step-counter {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .lesson-step-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--primary);
    background: var(--primary-bg);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    transition: all 0.3s ease;
  }
  .lesson-card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    transition: opacity 0.3s ease;
  }

  /* ── Slide Container ── */
  .slide-container {
    position: relative;
    overflow: hidden;
  }

  /* ── Card Body: Two-Column Layout ── */
  .card-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding: 24px 32px 20px;
    min-height: 440px;
    transition: opacity 0.1s ease;
  }

  .card-body.slide-out-left {
    animation: slideOutLeft 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .card-body.slide-in-right {
    animation: slideInRight 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .card-body.slide-out-right {
    animation: slideOutRight 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .card-body.slide-in-left {
    animation: slideInLeft 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes slideOutLeft {
    from { transform: translateX(0); opacity: 1; }
    to   { transform: translateX(-60px); opacity: 0; }
  }
  @keyframes slideInRight {
    from { transform: translateX(60px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideOutRight {
    from { transform: translateX(0); opacity: 1; }
    to   { transform: translateX(60px); opacity: 0; }
  }
  @keyframes slideInLeft {
    from { transform: translateX(-60px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  /* ── Left: Diagram Area ── */
  .diagram-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 24px 16px 0;
    border-right: 1px solid var(--border-light);
    position: relative;
  }
  .diagram-area::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 45%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, hsla(258, 78%, 64%, 0.04) 0%, transparent 70%);
    pointer-events: none;
    border-radius: 50%;
  }
  .diagram-svg-wrap {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
  }

  /* SVG styling */
  .cls-box {
    rx: 10; ry: 10;
    stroke-width: 1.5;
  }
  .cls-subject {
    fill: hsla(258, 78%, 64%, 0.06);
    stroke: var(--primary);
    filter: url(#glow);
  }
  .cls-observer {
    fill: hsla(220, 5%, 90%, 0.04);
    stroke: rgba(255,255,255,0.18);
  }
  .cls-concrete {
    fill: hsla(152, 65%, 48%, 0.05);
    stroke: hsla(152, 65%, 48%, 0.3);
  }
  .cls-error-box {
    fill: hsla(0, 65%, 58%, 0.06);
    stroke: hsla(0, 65%, 58%, 0.35);
  }
  .cls-tangled {
    fill: hsla(220, 5%, 90%, 0.03);
    stroke: rgba(255,255,255,0.12);
  }
  .cls-name {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 700;
    fill: var(--text);
  }
  .cls-stereotype {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 9.5px;
    font-weight: 500;
    fill: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .cls-member {
    font-family: var(--mono);
    font-size: 10.5px;
    fill: var(--text-muted);
  }
  .cls-divider {
    stroke: rgba(255,255,255,0.08);
    stroke-width: 1;
  }
  .arrow-line {
    stroke: var(--primary);
    stroke-width: 1.5;
    stroke-dasharray: 6, 4;
    fill: none;
  }
  .arrow-solid {
    stroke: rgba(255,255,255,0.2);
    stroke-width: 1.2;
    fill: none;
  }
  .arrow-head {
    fill: var(--primary);
  }
  .arrow-head-hollow {
    fill: none;
    stroke: rgba(255,255,255,0.2);
    stroke-width: 1.2;
  }

  /* Animated dashes */
  @keyframes dashFlow {
    to { stroke-dashoffset: -20; }
  }
  .arrow-animated {
    animation: dashFlow 1.2s linear infinite;
  }

  /* Glow pulse on Subject box */
  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .glow-pulse {
    animation: glowPulse 2.5s ease-in-out infinite;
  }

  /* SVG entrance stagger */
  .svg-stagger { opacity: 0; }
  .svg-stagger.animate-in {
    animation: svgFadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes svgFadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Right: Prompt + Interactive ── */
  .prompt-area {
    padding: 16px 0 16px 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .prompt-heading {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1.35;
  }
  .prompt-text {
    font-size: 14.5px;
    line-height: 1.75;
    color: hsl(220, 5%, 72%);
    margin-bottom: 28px;
  }
  .prompt-text code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--primary-bg);
    color: var(--primary);
    padding: 2px 7px;
    border-radius: 5px;
    font-weight: 500;
  }
  .prompt-text .highlight-error {
    color: var(--error);
    font-weight: 600;
  }
  .prompt-text .highlight-success {
    color: var(--success);
    font-weight: 600;
  }

  /* ── Multiple Choice Cards ── */
  .mc-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .mc-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .mc-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--elevated);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    user-select: none;
  }
  .mc-option:hover:not(.correct):not(.wrong):not(.disabled) {
    border-color: rgba(255,255,255,0.18);
    background: hsl(225, 7%, 15%);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  .mc-option:active:not(.correct):not(.wrong):not(.disabled) {
    transform: translateY(0px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .mc-option.selected {
    border-color: var(--primary);
    background: var(--primary-bg);
    box-shadow: 0 0 0 1px var(--primary), 0 4px 20px hsla(258, 78%, 64%, 0.12);
  }
  .mc-option.correct {
    border-color: var(--success);
    background: var(--success-bg);
    box-shadow: 0 0 0 1px var(--success), 0 4px 20px hsla(152, 65%, 48%, 0.15);
    cursor: default;
  }
  .mc-option.wrong {
    border-color: var(--error);
    background: var(--error-bg);
    box-shadow: 0 0 0 1px var(--error);
  }
  .mc-option.wrong .mc-letter {
    background: var(--error);
    color: white;
    border-color: var(--error);
  }
  .mc-option.disabled {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }
  .mc-letter {
    width: 26px; height: 26px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    border: 1px solid var(--border);
    transition: all 0.2s ease;
  }
  .mc-option.selected .mc-letter {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .mc-option.correct .mc-letter {
    background: var(--success);
    color: white;
    border-color: var(--success);
  }
  .mc-option-text {
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.4;
    font-weight: 500;
    flex: 1;
  }
  .mc-option.correct .mc-option-text {
    color: var(--success);
  }
  .mc-option.wrong .mc-option-text {
    color: var(--error);
  }
  .mc-checkmark {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .mc-option.correct .mc-checkmark {
    opacity: 1;
  }

  /* ── Feedback Banners ── */
  .feedback-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 0;
    padding: 0 16px;
    border-radius: var(--radius-xs);
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
    max-height: 0;
    overflow: hidden;
  }
  .feedback-banner.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
    max-height: 60px;
    margin-top: 14px;
    padding: 10px 16px;
  }
  .feedback-banner.success-banner {
    background: var(--success-bg);
    border: 1px solid hsla(152, 65%, 48%, 0.25);
    color: var(--success);
  }
  .feedback-banner.error-banner {
    background: var(--error-bg);
    border: 1px solid hsla(0, 65%, 58%, 0.25);
    color: var(--error);
  }

  /* ── Shake animation ── */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15% { transform: translateX(-5px); }
    30% { transform: translateX(5px); }
    45% { transform: translateX(-4px); }
    60% { transform: translateX(4px); }
    75% { transform: translateX(-2px); }
    90% { transform: translateX(2px); }
  }
  .mc-option.shaking {
    animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }

  /* ── Green flash ── */
  @keyframes greenFlash {
    0% { box-shadow: 0 0 0 0 hsla(152, 65%, 48%, 0.4); }
    50% { box-shadow: 0 0 0 8px hsla(152, 65%, 48%, 0); }
    100% { box-shadow: 0 0 0 1px var(--success), 0 4px 20px hsla(152, 65%, 48%, 0.15); }
  }
  .mc-option.correct-flash {
    animation: greenFlash 0.6s ease-out;
  }

  /* ── Red flash ── */
  @keyframes redFlash {
    0% { box-shadow: 0 0 0 0 hsla(0, 65%, 58%, 0.4); }
    50% { box-shadow: 0 0 0 6px hsla(0, 65%, 58%, 0); }
    100% { box-shadow: 0 0 0 1px var(--error); }
  }
  .mc-option.red-flash {
    animation: redFlash 0.4s ease-out;
  }

  /* ── Bottom Bar: Dots + Nav Buttons ── */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px 22px;
    border-top: 1px solid var(--border-light);
  }
  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--elevated);
    color: var(--text-muted);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    outline: none;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
    background: hsl(225, 7%, 15%);
  }
  .nav-btn:active:not(:disabled) {
    transform: scale(0.97);
  }
  .nav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .nav-btn.primary-btn {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }
  .nav-btn.primary-btn:hover:not(:disabled) {
    background: hsl(258, 78%, 58%);
    border-color: hsl(258, 78%, 58%);
    box-shadow: 0 4px 20px hsla(258, 78%, 64%, 0.3);
  }
  .nav-arrow {
    font-size: 15px;
    line-height: 1;
  }

  /* ── Progress Dots ── */
  .progress-dots {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    cursor: pointer;
  }
  .dot:hover {
    background: rgba(255,255,255,0.15);
  }
  .dot.completed {
    background: var(--primary-dim);
  }
  .dot.current {
    background: var(--primary);
    box-shadow: 0 0 8px hsla(258, 78%, 64%, 0.5);
    width: 22px;
    border-radius: 5px;
  }

  /* ── Filmstrip Thumbnails ── */
  .filmstrip {
    max-width: 1160px;
    margin: 0 auto 20px;
    padding: 0 24px;
  }
  .filmstrip-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .filmstrip-row {
    display: flex;
    gap: 14px;
    justify-content: center;
  }
  .thumb {
    width: 160px;
    height: 96px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1.5px solid var(--border);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    flex-shrink: 0;
  }
  .thumb:hover:not(.active) {
    border-color: rgba(255,255,255,0.18);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .thumb.active {
    border-color: var(--primary);
    box-shadow:
      0 0 0 1px var(--primary),
      0 0 20px hsla(258, 78%, 64%, 0.2),
      0 6px 24px hsla(258, 78%, 64%, 0.12);
  }
  .thumb-inner {
    width: 100%;
    height: 100%;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .thumb-bar {
    height: 2px;
    border-radius: 1px;
    background: rgba(255,255,255,0.06);
    position: relative;
  }
  .thumb-bar-fill {
    height: 100%;
    border-radius: 1px;
    background: var(--primary-dim);
    transition: width 0.5s ease;
  }
  .thumb-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    flex: 1;
  }
  .thumb-col {
    border-radius: 3px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s ease;
  }
  .thumb-col-line {
    height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 1px;
    margin: 6px 5px 0;
  }
  .thumb-col-box {
    width: 60%;
    height: 10px;
    margin: 5px auto 0;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: border-color 0.3s ease;
  }
  .thumb-title {
    font-size: 9px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
    margin-top: auto;
    padding-top: 2px;
    letter-spacing: 0.3px;
    transition: color 0.3s ease;
  }
  .thumb.active .thumb-title {
    color: var(--primary);
  }

  /* Keyboard nav hint */
  .keyboard-hint {
    text-align: center;
    padding: 0 24px 32px;
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.5;
    letter-spacing: 0.3px;
  }
  .keyboard-hint kbd {
    display: inline-block;
    padding: 2px 6px;
    background: var(--elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--font);
    font-size: 10px;
    font-weight: 600;
    margin: 0 1px;
  }

  /* ── Responsive ── */
  @media (max-width: 820px) {
    .card-body {
      grid-template-columns: 1fr;
      min-height: auto;
    }
    .diagram-area {
      border-right: none;
      border-bottom: 1px solid var(--border-light);
      padding: 16px 0 24px;
    }
    .prompt-area {
      padding: 24px 0 16px;
    }
    .card-body {
      padding: 24px 24px 16px;
    }
    .lesson-label, .card-footer {
      padding-left: 24px;
      padding-right: 24px;
    }
  }

  @media (max-width: 560px) {
    .filmstrip-row { gap: 8px; }
    .thumb { width: 120px; height: 78px; }
  }
</style>
</head>
<body>

<!-- Demo Header -->
<div class="demo-header">
  <h1>Approach B: Brilliant-Style Full Takeover</h1>
  <p>
    The entire viewport becomes one lesson card. No sidebar, no panels, no tabs.
    Each step is a focused, interactive micro-lesson with a diagram and a prompt.

        <span>Correct! The Subject loops through its observer list and calls update() on each one.</span>
      </div>
      <div class="feedback-banner error-banner" id="errorBanner">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="hsl(0,65%,58%)" stroke-width="1.5"/>
          <path d="M5.5 5.5L10.5 10.5M10.5 5.5L5.5 10.5" stroke="hsl(0,65%,58%)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Not quite. Think about what notify() actually does with the observer list.</span>
      </div>
    </div>
  </div>
</template>

<!-- Filmstrip Thumbnail Template -->
<template id="tpl-thumb">
  <div class="thumb">
    <div class="thumb-inner">
      <div class="thumb-bar"><div class="thumb-bar-fill"></div></div>
      <div class="thumb-cols">
        <div class="thumb-col">
          <div class="thumb-col-box"></div>
        </div>
        <div class="thumb-col">
          <div class="thumb-col-line"></div>
          <div class="thumb-col-line" style="width:60%"></div>
        </div>
      </div>
      <div class="thumb-title"></div>
    </div>
  </div>
</template>

<script>
(function() {
  'use strict';

  /* ================================================================
   *  Card metadata (titles, progress, thumb info)
   * ================================================================ */
  var CARDS = [
    { title: 'The Problem',         stepLabel: '1 of 3', progress: 33.3, thumbLabel: 'The Problem',  thumbAccent: 'hsl(0,65%,58%)'   },
    { title: 'The Insight',         stepLabel: '2 of 3', progress: 66.6, thumbLabel: 'The Insight',  thumbAccent: 'var(--primary)'    },
    { title: 'Check Understanding', stepLabel: '3 of 3', progress: 100,  thumbLabel: 'Quiz',         thumbAccent: 'hsl(152,65%,48%)' }
  ];

  var TOTAL = CARDS.length;

  /* ── State ── */
  var currentCard = 0;
  var isTransitioning = false;
  var quizAnswered = false;
  var autoAdvanceTimer = null;

  /* ── DOM refs ── */
  var slideContainer = document.getElementById('slideContainer');
  var progressFill   = document.getElementById('progressFill');
  var stepBadge      = document.getElementById('stepBadge');
  var cardTitleLabel = document.getElementById('cardTitleLabel');
  var progressDots   = document.getElementById('progressDots');
  var filmstripRow   = document.getElementById('filmstripRow');
  var prevBtn        = document.getElementById('prevBtn');
  var nextBtn        = document.getElementById('nextBtn');

  /* ================================================================
   *  Render card from <template> (safe DOM cloning, no innerHTML)
   * ================================================================ */
  function renderCard(index, direction) {
    var card = CARDS[index];

    // Update header
    stepBadge.textContent = card.stepLabel;
    cardTitleLabel.textContent = card.title;

    // Update progress bar
    progressFill.style.width = card.progress + '%';

    // Update dots
    renderDots(index);

    // Update filmstrip
    updateFilmstrip(index);

    // Update nav buttons
    prevBtn.disabled = (index === 0);
    if (index === TOTAL - 1) {
      nextBtn.textContent = '';
      var finishText = document.createTextNode('Finish ');
      var finishArrow = document.createElement('span');
      finishArrow.className = 'nav-arrow';
      finishArrow.textContent = '\u2713';
      nextBtn.appendChild(finishText);
      nextBtn.appendChild(finishArrow);
    } else {
      nextBtn.textContent = '';
      var nextText = document.createTextNode('Next ');
      var nextArrow = document.createElement('span');
      nextArrow.className = 'nav-arrow';
      nextArrow.textContent = '\u2192';
      nextBtn.appendChild(nextText);
      nextBtn.appendChild(nextArrow);
    }

    // Clone from template
    var tpl = document.getElementById('tpl-card-' + index);
    var newContent = tpl.content.cloneNode(true);
    var newBody = newContent.querySelector('.card-body');

    if (direction === 'none') {
      // Clear and insert
      while (slideContainer.firstChild) slideContainer.removeChild(slideContainer.firstChild);
      slideContainer.appendChild(newContent);
      bindQuizEvents();
      animateSVGEntrance();
      isTransitioning = false;
      return;
    }

    var oldBody = document.getElementById('cardBody');
    if (oldBody) {
      var outClass = direction === 'next' ? 'slide-out-left' : 'slide-out-right';
      oldBody.classList.add(outClass);

      oldBody.addEventListener('animationend', function handler() {
        oldBody.removeEventListener('animationend', handler);
        // Remove old
        while (slideContainer.firstChild) slideContainer.removeChild(slideContainer.firstChild);
        // Insert new with entrance animation
        var inClass = direction === 'next' ? 'slide-in-right' : 'slide-in-left';
        slideContainer.appendChild(newContent);
        var insertedBody = document.getElementById('cardBody');
        insertedBody.classList.add(inClass);
        insertedBody.addEventListener('animationend', function h2() {
          insertedBody.removeEventListener('animationend', h2);
          insertedBody.classList.remove(inClass);
          isTransitioning = false;
        });
        bindQuizEvents();
        animateSVGEntrance();
      });
    } else {
      while (slideContainer.firstChild) slideContainer.removeChild(slideContainer.firstChild);
      slideContainer.appendChild(newContent);
      bindQuizEvents();
      animateSVGEntrance();
      isTransitioning = false;
    }
  }

  /* ================================================================
   *  Progress dots
   * ================================================================ */
  function renderDots(index) {
    while (progressDots.firstChild) progressDots.removeChild(progressDots.firstChild);
    for (var i = 0; i < TOTAL; i++) {
      var dot = document.createElement('div');
      dot.className = 'dot';
      if (i < index) dot.classList.add('completed');
      if (i === index) dot.classList.add('current');
      dot.setAttribute('role', 'button');
      dot.setAttribute('aria-label', 'Go to card ' + (i + 1));
      dot.setAttribute('tabindex', '0');
      (function(idx) {
        dot.addEventListener('click', function() { goToCard(idx); });
      })(i);
      progressDots.appendChild(dot);
    }
  }

  /* ================================================================
   *  Filmstrip
   * ================================================================ */
  function buildFilmstrip() {
    var tpl = document.getElementById('tpl-thumb');
    for (var i = 0; i < TOTAL; i++) {
      var clone = tpl.content.cloneNode(true);
      var thumb = clone.querySelector('.thumb');
      thumb.setAttribute('data-index', i);
      thumb.setAttribute('title', CARDS[i].title);
      thumb.setAttribute('role', 'button');
      thumb.setAttribute('aria-label', 'Go to: ' + CARDS[i].title);

      // Set progress bar fill
      var fill = thumb.querySelector('.thumb-bar-fill');
      fill.style.width = CARDS[i].progress + '%';

      // Set accent color on box
      var box = thumb.querySelector('.thumb-col-box');
      box.style.borderColor = CARDS[i].thumbAccent;

      // Set title
      var title = thumb.querySelector('.thumb-title');
      title.textContent = CARDS[i].thumbLabel;

      // Click handler
      (function(idx) {
        thumb.addEventListener('click', function() { goToCard(idx); });
      })(i);

      filmstripRow.appendChild(clone);
    }
    updateFilmstrip(0);
  }

  function updateFilmstrip(index) {
    var thumbs = filmstripRow.querySelectorAll('.thumb');
    for (var i = 0; i < thumbs.length; i++) {
      if (i === index) {
        thumbs[i].classList.add('active');
      } else {
        thumbs[i].classList.remove('active');
      }
    }
  }

  /* ================================================================
   *  SVG entrance stagger
   * ================================================================ */
  function animateSVGEntrance() {
    var elements = document.querySelectorAll('.svg-stagger');
    for (var i = 0; i < elements.length; i++) {
      (function(el) {
        var delay = parseInt(el.getAttribute('data-delay') || '0', 10);
        setTimeout(function() {
          el.classList.add('animate-in');
        }, delay);
      })(elements[i]);
    }
  }

  /* ================================================================
   *  Quiz interaction
   * ================================================================ */
  function bindQuizEvents() {
    quizAnswered = false;
    var options = document.querySelectorAll('.mc-option');
    for (var i = 0; i < options.length; i++) {
      options[i].addEventListener('click', handleOptionClick);
      options[i].addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          handleOptionClick.call(this, e);
        }
      });
    }
  }

  function handleOptionClick() {
    var el = this.closest ? this.closest('.mc-option') : this;
    if (!el || !el.classList) return;
    if (quizAnswered || isTransitioning) return;

    var isCorrect = el.getAttribute('data-correct') === 'true';
    var successBanner = document.getElementById('successBanner');
    var errorBanner = document.getElementById('errorBanner');

    // Clear previous wrong states
    var allOpts = document.querySelectorAll('.mc-option');
    for (var i = 0; i < allOpts.length; i++) {
      allOpts[i].classList.remove('wrong', 'shaking', 'red-flash', 'selected');
    }
    if (errorBanner) errorBanner.classList.remove('show');

    if (isCorrect) {
      quizAnswered = true;
      el.classList.add('correct', 'correct-flash');
      if (successBanner) successBanner.classList.add('show');
      if (errorBanner) errorBanner.classList.remove('show');

      // Disable other options
      for (var j = 0; j < allOpts.length; j++) {
        if (!allOpts[j].classList.contains('correct')) {
          allOpts[j].classList.add('disabled');
        }
      }

      // Auto-advance if not last card
      if (currentCard < TOTAL - 1) {
        autoAdvanceTimer = setTimeout(function() {
          goNext();
        }, 1500);
      }
    } else {
      el.classList.add('wrong', 'shaking', 'red-flash');
      if (errorBanner) errorBanner.classList.add('show');
      if (successBanner) successBanner.classList.remove('show');

      // Remove shake after animation
      setTimeout(function() {
        el.classList.remove('shaking');
      }, 500);
      // Remove wrong highlight so they can retry
      setTimeout(function() {
        el.classList.remove('wrong', 'red-flash');
        if (errorBanner) errorBanner.classList.remove('show');
      }, 1800);
    }
  }

  /* ================================================================
   *  Navigation
   * ================================================================ */
  function goNext() {
    if (isTransitioning || currentCard >= TOTAL - 1) return;
    if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
    isTransitioning = true;
    currentCard++;
    renderCard(currentCard, 'next');
  }

  function goPrev() {
    if (isTransitioning || currentCard <= 0) return;
    if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
    isTransitioning = true;
    currentCard--;
    renderCard(currentCard, 'prev');
  }

  function goToCard(index) {
    if (isTransitioning || index === currentCard) return;
    if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
    isTransitioning = true;
    var direction = index > currentCard ? 'next' : 'prev';
    currentCard = index;
    renderCard(currentCard, direction);
  }

  // Button handlers
  nextBtn.addEventListener('click', goNext);
  prevBtn.addEventListener('click', goPrev);

  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft') goPrev();
  });

  /* ================================================================
   *  Init
   * ================================================================ */
  buildFilmstrip();
  renderCard(0, 'none');

})();
</script>

</body>
</html>
