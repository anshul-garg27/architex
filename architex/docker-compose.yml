services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: sh -c "corepack enable && pnpm dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgresql://architex:architex@postgres:5432/architex
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - architex

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: architex
      POSTGRES_PASSWORD: architex
      POSTGRES_DB: architex
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U architex -d architex"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - architex

volumes:
  pgdata:

networks:
  architex:
    driver: bridge
