name: Dependency Audit

on:
  schedule:
    # Every Sunday at 2:00 AM UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run dependency audit
        id: audit
        run: |
          set +e
          AUDIT_OUTPUT=$(pnpm audit --audit-level=high 2>&1)
          AUDIT_EXIT=$?
          set -e
          echo "exit_code=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"
          {
            echo "output<<AUDIT_EOF"
            echo "$AUDIT_OUTPUT"
            echo "AUDIT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create issue on vulnerabilities
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const auditOutput = `${{ steps.audit.outputs.output }}`;
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Dependency audit: high-severity vulnerabilities found (${today})`,
              body: [
                '## Dependency Audit Report',
                '',
                `**Date:** ${today}`,
                '**Severity threshold:** high',
                '',
                '### Audit Output',
                '',
                '```',
                auditOutput,
                '```',
                '',
                '---',
                '_Generated by the weekly dependency audit workflow._',
              ].join('\n'),
              labels: ['security', 'dependencies'],
            });
