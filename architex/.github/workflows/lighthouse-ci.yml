name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Start server
        run: |
          pnpm start &
          sleep 5
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000/api/health

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000
          uploadArtifacts: true
          temporaryPublicStorage: true
          configJson: |
            {
              "ci": {
                "assert": {
                  "assertions": {
                    "categories:performance": ["error", { "minScore": 0.9 }],
                    "categories:accessibility": ["error", { "minScore": 0.95 }],
                    "categories:best-practices": ["error", { "minScore": 0.9 }],
                    "categories:seo": ["error", { "minScore": 0.9 }]
                  }
                }
              }
            }

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 14

      - name: Format and comment Lighthouse score
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          LIGHTHOUSE_MANIFEST: "${{ steps.lighthouse.outputs.manifest }}"
        with:
          script: |
            const results = JSON.parse(process.env.LIGHTHOUSE_MANIFEST);
            const summary = results[0].summary;

            const score = (v) => Math.round(v * 100);
            const emoji = (v) => v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴';

            const body = [
              '## Lighthouse Results',
              '',
              '| Category | Score |',
              '|----------|-------|',
              `| ${emoji(summary.performance)} Performance | ${score(summary.performance)} |`,
              `| ${emoji(summary.accessibility)} Accessibility | ${score(summary.accessibility)} |`,
              `| ${emoji(summary['best-practices'])} Best Practices | ${score(summary['best-practices'])} |`,
              `| ${emoji(summary.seo)} SEO | ${score(summary.seo)} |`,
              '',
              `[Full Report](${results[0].url})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
